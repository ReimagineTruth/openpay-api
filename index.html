  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (function () {
        if (window.__PI_SDK_LOADING__) return;
        window.__PI_SDK_LOADING__ = true;

        var host = window.location.hostname || "";
        var isLocal =
          host === "localhost" ||
          host === "127.0.0.1" ||
          host.endsWith(".local") ||
          host.endsWith(".test");

        var script = document.createElement("script");
        script.src = "https://sdk.minepi.com/pi-sdk.js";
        script.onload = function () {
          try {
            if (window.Pi && typeof window.Pi.init === "function") {
              var sandbox = isLocal;
              window.Pi.init({ version: "2.0", sandbox: sandbox });
            }
          } catch (e) {
            console.warn("Pi SDK init failed:", e);
          }
          try {
            window.dispatchEvent(new Event("pi-sdk-ready"));
          } catch (e) {
            // ignore
          }
        };
        script.onerror = function () {
          try {
            window.dispatchEvent(new Event("pi-sdk-error"));
          } catch (e) {
            // ignore
          }
        };
        document.head.appendChild(script);
      })();
    </script>
  </body>
